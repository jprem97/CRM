<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Admin Portal</h1>
        <div id="auth-section">
            <div id="login-form">
                <h2>Login</h2>
                <form id="login">
                    <input type="email" id="login-email" name="email" placeholder="Email" required>
                    <input type="password" id="login-password" name="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
            </div>
            <div id="register-form" class="hidden">
                <h2>Register</h2>
                <form id="register">
                    <input type="text" id="reg-name" name="name" placeholder="Name" required>
                    <input type="email" id="reg-email" name="email" placeholder="Email" required>
                    <input type="password" id="reg-password" name="password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
                <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
            </div>
        </div>
        <div id="dashboard" class="hidden">
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            <h1>👑 Admin Dashboard</h1>
            <div class="dashboard">
                <div class="section">
                    <h2>🔍 Filter Agents by Location</h2>
                    <input type="text" id="location-filter" placeholder="Enter location">
                    <button onclick="filterAgents()">Search</button>
                    <div id="agents"></div>
                </div>
                <div class="section">
                    <h2>📊 Agent Performance</h2>
                    <div id="performance"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        document.getElementById('login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };
            try {
                const result = await apiCall('/users/login', 'POST', data);
                localStorage.setItem('token', result.accessToken);
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadDashboard();
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });

        document.getElementById('register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                role: 'ADMIN'
            };
            try {
                await apiCall('/users/register', 'POST', data);
                alert('Registration successful. Please login.');
                showLogin();
            } catch (error) {
                alert('Registration failed: ' + error.message);
            }
        });

        async function loadDashboard() {
            try {
                const performance = await apiCall('/admin/agent-performance');
                document.getElementById('performance').innerHTML = '<table><tr><th>Agent</th><th>Performance Score</th><th>Current Load</th><th>Total Deals</th></tr>' +
                    performance.map(p => `<tr><td>${p.name}</td><td>${p.performanceScore}</td><td>${p.currentLoad}</td><td>${p.report.totalDeals}</td></tr>`).join('') + '</table>';
            } catch (error) {
                document.getElementById('performance').innerHTML = '<p class="error-message">Error loading performance data: ' + error.message + '</p>';
            }
        }

        async function filterAgents() {
            const location = document.getElementById('location-filter').value;
            try {
                const agents = await apiCall(`/admin/agents-by-location?location=${encodeURIComponent(location)}`);
                document.getElementById('agents').innerHTML = '<table><tr><th>Name</th><th>Email</th><th>Location</th><th>Performance Score</th></tr>' +
                    agents.map(a => `<tr><td>${a.user.name}</td><td>${a.user.email}</td><td>${a.location}</td><td>${a.performanceScore}</td></tr>`).join('') + '</table>';
            } catch (error) {
                document.getElementById('agents').innerHTML = '<p class="error-message">Error filtering agents: ' + error.message + '</p>';
            }
        }

        if (localStorage.getItem('token')) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadDashboard();
        }
    </script>
</body>
</html>
